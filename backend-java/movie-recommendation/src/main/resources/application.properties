spring.application.name=movie-recommendation
app.jwt.secret=${JWT_SECRET:VGhpc0lzQURlbW9TZWNyZXRLZXlGb3JKV1RTZXJ2aWNlMTIzNDU2Nzg5MDEyMzQ=}
app.jwt.expiration=3600000
app.jwt.refresh-expiration=604800000
app.cors.allowed-origin-patterns=${CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:*,http://127.0.0.1:*,https://*.ngrok-free.app,https://*.ngrok-free.dev,https://*.vercel.app,https://*.github.io}
app.dataset.movies-path=${MOVIES_DATASET_PATH:classpath:movies_ready_for_db.csv}
app.dataset.ratings-path=${RATINGS_DATASET_PATH:classpath:ratings.csv}
spring.datasource.url=jdbc:h2:file:./data/movie_recommendation;MODE=MySQL;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
server.port=${PORT:8080}
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
tmdb.api.access-token=${TMDB_ACCESS_TOKEN:}
tmdb.api.key=${TMDB_API_KEY:}
tmdb.api.base-url=https://api.themoviedb.org/3
tmdb.api.image-base-url=https://image.tmdb.org/t/p/w500
