spring.application.name=movie-recommendation
app.jwt.secret=${JWT_SECRET:VGhpc0lzQURlbW9TZWNyZXRLZXlGb3JKV1RTZXJ2aWNlMTIzNDU2Nzg5MDEyMzQ=}
app.jwt.expiration=3600000
app.jwt.refresh-expiration=604800000
app.cors.allowed-origin-patterns=${CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:*,http://127.0.0.1:*,https://*.ngrok-free.app,https://*.ngrok-free.dev,https://*.vercel.app,https://*.github.io,https://*.onrender.com}
app.dataset.movies-path=${MOVIES_DATASET_PATH:classpath:movies_ready_for_db.csv}
app.dataset.ratings-path=${RATINGS_DATASET_PATH:classpath:ratings.csv}
app.data-loader.enabled=${APP_DATA_LOADER_ENABLED:false}
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:file:./data/movie_recommendation;MODE=MySQL;AUTO_SERVER=TRUE}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
server.port=${PORT:10000}
server.address=0.0.0.0
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.flyway.enabled=${FLYWAY_ENABLED:false}
spring.flyway.baseline-on-migrate=true
spring.h2.console.enabled=${H2_CONSOLE_ENABLED:false}
spring.h2.console.path=/h2-console
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
tmdb.api.access-token=${TMDB_ACCESS_TOKEN:}
tmdb.api.key=${TMDB_API_KEY:}
tmdb.api.base-url=https://api.themoviedb.org/3
tmdb.api.image-base-url=https://image.tmdb.org/t/p/w500
